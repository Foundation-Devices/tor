name: tor
description: A multi-platform Flutter plugin for managing a Tor proxy. Based on arti.
version: 0.2.0
homepage: https://github.com/Foundation-Devices/tor

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  flutter_rust_bridge: 2.11.1
  freezed_annotation: ^2.4.1
  rust_lib_tor:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^2.4.5
  build_runner: ^2.4.7

# Note: The actual FFI plugin is rust_lib_tor in rust_builder/
# This package is a pure Dart wrapper around rust_lib_tor
